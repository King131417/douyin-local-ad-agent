<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ code }} - Douyin Local Ad Agent</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; background: #f5f5f7; color: #1d1d1f;
  }
  .container { text-align: center; padding: 40px 20px; }
  .code { font-size: 72px; font-weight: 200; color: #86868b; margin-bottom: 8px; }
  .message { font-size: 18px; color: #86868b; margin-bottom: 32px; }
  .home-link {
    display: inline-block; padding: 12px 32px;
    background: #0071e3; color: #fff; border-radius: 8px;
    text-decoration: none; font-size: 15px; font-weight: 500;
  }
  .home-link:hover { background: #0077ed; }
</style>
</head>
<body>
<div class="container">
  <div class="code">{{ code }}</div>
  <div class="message">{{ message }}</div>
  <a href="/" class="home-link">返回首页</a>
</div>
</body>
</html>
